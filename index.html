<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Offis - Mis Juegos</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul-offis: #00aaff;
            --magenta-offis: #ff00aa;
            --fondo-oscuro: #070b14;
            --cristal-bg: rgba(15, 20, 35, 0.4);
            --cristal-borde: rgba(0, 170, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            text-align: center;
            background-color: var(--fondo-oscuro);
            color: #ffffff;
            /* Fondo simulando partículas/energía estática */
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 170, 255, 0.1), transparent 30%),
                radial-gradient(circle at 85% 30%, rgba(255, 0, 170, 0.1), transparent 30%);
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header con Glassmorphism */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--cristal-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--cristal-borde);
            padding: 15px 30px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header img {
            height: 45px;
            filter: drop-shadow(0 0 8px var(--azul-offis));
            transition: transform 0.3s ease;
        }

        header img:hover {
            transform: scale(1.05);
        }

        .menu {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        .menu li a {
            color: #fff;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s, text-shadow 0.3s;
        }

        .menu li a:hover {
            color: var(--magenta-offis);
            text-shadow: 0 0 10px var(--magenta-offis);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            margin: 40px 0 30px;
            font-size: 2.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            /* Texto con degradado de la marca */
            background: linear-gradient(90deg, var(--azul-offis), var(--magenta-offis));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 170, 255, 0.3);
        }

        /* Contenedor principal con CSS Grid (3 columnas) */
        .game-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            max-width: 1000px;
            margin: 0 auto 50px;
            padding: 0 20px;
        }

        /* Adaptabilidad para móviles */
        @media (max-width: 850px) {
            .game-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 550px) {
            .game-container {
                grid-template-columns: 1fr;
            }
        }

        /* Tarjetas de juego (Glassmorphism) */
        .game {
            background: var(--cristal-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--cristal-borde);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            opacity: 0;
            animation: fadeIn 0.6s forwards;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        /* Delay escalonado para las animaciones de entrada */
        .game:nth-child(1) { animation-delay: 0.1s; }
        .game:nth-child(2) { animation-delay: 0.2s; }
        .game:nth-child(3) { animation-delay: 0.3s; }

        .game:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 30px rgba(255, 0, 170, 0.2);
            border-color: rgba(255, 0, 170, 0.5);
        }

        .game h3 {
            font-size: 1.4rem;
            margin-bottom: 15px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 5px var(--azul-offis);
        }

        iframe {
            width: 100%;
            height: 180px;
            border: none;
            border-radius: 10px;
            background-color: #111;
            box-shadow: inset 0 0 10px #000;
            margin-bottom: 15px;
            transition: filter 0.3s;
        }

        .game:hover iframe {
            filter: brightness(1.2);
        }

        /* Botón futurista interactivo */
        .btn {
            display: inline-block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, var(--azul-offis), var(--magenta-offis));
            color: white;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: none;
            cursor: pointer;
            transition: box-shadow 0.3s ease, transform 0.2s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, var(--magenta-offis), var(--azul-offis));
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
            border-radius: 8px;
        }

        .btn:hover::before {
            opacity: 1;
        }

        .btn:hover {
            box-shadow: 0 0 15px var(--magenta-offis);
            transform: scale(1.05);
        }

        /* Keyframes para la transición de entrada */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <header>
        <img src="https://i.ibb.co/rG9kFBPR/aficon.png" alt="Logo Anime Offis">
        <ul class="menu">
             <li><a href="https://www.animeoffis.com/perfil" id="profile-link">Perfil</a></li>
            <li><a href="https://www.animeoffis.com/logout" id="logout-link">Cerrar Sesión</a></li>
        </ul>
    </header>

    <h1>Mis Juegos</h1>
    
    <div class="game-container">
        <div class="game">
            <h3>Pistola</h3>
            <iframe src="player.png"></iframe>
            <a href="pistola.html" class="btn">Jugar</a>
        </div>
        <div class="game">
            <h3>Rompecabezas</h3>
            <iframe src="espacio.jpeg"></iframe>
            <a href="rompe.html" class="btn">Jugar</a>
        </div>
        <div class="game">
            <h3>Avión</h3>
            <iframe src="avion.png"></iframe>
            <a href="avión.html" class="btn">Jugar</a>
        </div>
        <div class="game">
            <h3>Protocolo Styceht</h3>
            <iframe src="Data.png"></iframe>
            <a href="Data.html" class="btn">Jugar</a>
        </div>
        </div>

</body>
</html>
